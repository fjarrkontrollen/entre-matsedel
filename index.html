<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Matsedel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: transparent;
    font-family: 'Inter', sans-serif;
    padding-left: 80px;
    padding-top: 40px;
    opacity: 0;
    transition: opacity 1.2s ease;
  }

  .container {
    width: 900px;
    height: 520px;
    overflow: hidden;
  }

  .date {
    font-size: 36px;
    font-weight: 500;
    color: #D1D5DB;
    margin-bottom: 15px;
  }

  .title {
    font-size: 32px;
    font-weight: 500;
    color: #D1D5DB;
    margin-bottom: 20px;
  }

  .meals-wrapper {
    height: 280px;
    overflow: hidden;
  }

  .meal {
    font-size: 48px;
    font-weight: 500;
    color: #E5E7EB;
    line-height: 1.2;
    margin-bottom: 15px;
    word-break: break-word;
  }

  .error {
    font-size: 36px;
    color: #F87171;
  }
</style>
</head>

<body>

<div id="output">Laddar...</div>

<script>

const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTv0TPMhZnKEg0SkHfRx7-s8XiITehnj6o_fYQm4YqNY1zxvmnEElzleBI_Q3eAG-mt8AyIdk3Qiwc6/pub?output=csv";

/* ================================
   Hjälpfunktioner
================================ */

// Svenskt datum (lokal tid)
function getTodayString() {
  const now = new Date();
  return now.getFullYear() + "-" +
    String(now.getMonth() + 1).padStart(2, '0') + "-" +
    String(now.getDate()).padStart(2, '0');
}

function formatDateSwedish(date) {
  const weekdays = ["Söndag","Måndag","Tisdag","Onsdag","Torsdag","Fredag","Lördag"];
  const months = ["Januari","Februari","Mars","April","Maj","Juni","Juli","Augusti","September","Oktober","November","December"];
  return weekdays[date.getDay()] + " " + date.getDate() + " " + months[date.getMonth()];
}

// Säker text (skydd mot HTML-injection)
function escapeHTML(str) {
  return str.replace(/[&<>"']/g, function(match) {
    const escape = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    };
    return escape[match];
  });
}

/* ================================
   Robust CSV-parser
================================ */

// Klarar:
/// - Komma
// - Semikolon
// - Citattecken
// - Kommatecken i text

function parseCSVLine(line) {

  const result = [];
  let current = '';
  let insideQuotes = false;
  let separator = null;

  // Auto-detect separator första gången
  if (line.includes(";") && line.includes(",")) {
    separator = ",";
  } else if (line.includes(";")) {
    separator = ";";
  } else {
    separator = ",";
  }

  for (let i = 0; i < line.length; i++) {
    const char = line[i];

    if (char === '"') {
      insideQuotes = !insideQuotes;
      continue;
    }

    if (!insideQuotes && char === separator) {
      result.push(current.trim());
      current = '';
      continue;
    }

    current += char;
  }

  result.push(current.trim());
  return result;
}

/* ================================
   Ladda CSV
================================ */

function loadCSV() {

  fetch(csvUrl)
    .then(response => {
      if (!response.ok) throw new Error("CSV kunde inte hämtas.");
      return response.text();
    })
    .then(data => processCSV(data))
    .catch(err => showError("Kunde inte ladda matsedel."));
}

function processCSV(data) {

  const rows = data.trim().split("\n");
  const todayStr = getTodayString();
  const todayDate = new Date();

  for (let i = 1; i < rows.length; i++) {

    const cols = parseCSVLine(rows[i]);
    if (!cols || cols.length < 3) continue;

    const rowDate = cols[0];
    const mainMeal = cols[1];
    const altMeal = cols[2];

    if (rowDate === todayStr) {

      renderMenu(todayDate, mainMeal, altMeal);
      return;
    }
  }

  showError("Ingen matsedel publicerad för idag.");
}

/* ================================
   Render
================================ */

function renderMenu(dateObj, mainMeal, altMeal) {

  document.getElementById("output").innerHTML =
    "<div class='container'>" +
      "<div class='date'>" + formatDateSwedish(dateObj) + "</div>" +
      "<div class='title'>Matsedel</div>" +
      "<div class='meals-wrapper'>" +
        "<div class='meal'>" + escapeHTML(mainMeal) + "</div>" +
        "<div class='meal'>" + escapeHTML(altMeal) + "</div>" +
      "</div>" +
    "</div>";

  setTimeout(autoResizeText, 50);
  fadeIn();
}

function showError(message) {
  document.getElementById("output").innerHTML =
    "<div class='container'>" +
      "<div class='error'>" + message + "</div>" +
    "</div>";
  fadeIn();
}

/* ================================
   Auto resize
================================ */

function autoResizeText() {

  const wrapper = document.querySelector('.meals-wrapper');
  const meals = document.querySelectorAll('.meal');

  let fontSize = 48;
  const minFontSize = 22;

  while (wrapper.scrollHeight > wrapper.clientHeight && fontSize > minFontSize) {
    fontSize--;
    meals.forEach(m => m.style.fontSize = fontSize + "px");
  }
}

/* ================================
   Fade in
================================ */

function fadeIn() {
  document.body.style.opacity = 1;
}

/* ================================
   Start
================================ */

loadCSV();

</script>

</body>
</html>
